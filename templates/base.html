<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tuckshop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/style.css">
  </head>

<body class="overflow-y-scroll">
  <div class="bg-panel"></div>
  <header class="page-header">
    <div class="container bg-body-secondary py-3">
      <h1 class="h4 mb-0">Yummiest Tuckshop</h1>
    </div>
  </header>

  <div class="sidebar-fixed-wrapper">
    <div class="container">
      <div class="row">
        <aside class="col-12 col-md-2 mb-4 px-0">
          <div class="sidebar bg-body-tertiary p-3 h-100">
            <ul class="nav nav-pills flex-column">
              <li class="nav-item"><a class="nav-link {{ 'active' if request.endpoint == 'products' or request.endpoint == 'search' }}" href="/products">Menu</a></li>
              <li class="nav-item"><a class="nav-link {{ 'active' if request.endpoint == 'cart' }}" href="/cart">Cart</a></li>
              {% if session.get('username') %}
              <li class="nav-item"><a class="nav-link" href="/signout">Sign Out</a></li>
              {% endif %}
            </ul>
          </div>
        </aside>
      </div>
    </div>
  </div>

  <div class="container-fluid px-0">  <!-- changed from "container" -->
    <main class="content-with-sidebar px-3">
      <div class="mb-3"></div>
      {% block content %}{% endblock %}
    </main>
  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
